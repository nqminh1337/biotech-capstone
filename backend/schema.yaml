components:
  schemas:
    Country:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        country_name:
          type: string
          maxLength: 255
      required:
      - country_name
      - id
    Event:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        event_name:
          type: string
          maxLength: 255
        description:
          type: string
          nullable: true
          maxLength: 255
        start_datetime:
          type: string
          format: date-time
        ends_datetime:
          type: string
          format: date-time
        location:
          type: string
          nullable: true
          maxLength: 255
        humanitix_link:
          type: string
          format: uri
          maxLength: 255
        host_user:
          type: integer
          readOnly: true
          nullable: true
        event_image:
          type: string
          nullable: true
          maxLength: 255
        is_virtual:
          type: boolean
      required:
      - ends_datetime
      - event_name
      - host_user
      - humanitix_link
      - id
      - start_datetime
    EventInviteSerializers:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        event:
          type: integer
        user:
          type: integer
        sent_datetime:
          type: string
          format: date-time
        attendance_status:
          type: boolean
        rsvp_status:
          type: boolean
      required:
      - event
      - id
      - user
    Group:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        group_number:
          type: string
          maxLength: 50
        group_name:
          type: string
          description: Name of Group (must not be empty)
          pattern: ^[A-Za-z0-9 _-]+$
          maxLength: 255
        track:
          type: integer
        cohort_year:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          description: Group Cohort Year (e.g. 2025)
        creation_datetime:
          type: string
          format: date-time
          readOnly: true
        deleted_flag:
          type: boolean
          readOnly: true
        deleted_datetime:
          type: string
          format: date-time
          readOnly: true
          nullable: true
      required:
      - creation_datetime
      - deleted_datetime
      - deleted_flag
      - group_name
      - id
      - track
    GroupMember:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        group:
          type: integer
        user:
          type: integer
      required:
      - group
      - id
      - user
    GroupWithoutMentorItem:
      type: object
      properties:
        group_number:
          type: string
        group_name:
          type: string
        cohort_year:
          type: integer
        track:
          $ref: '#/components/schemas/TrackMini'
        region:
          type: string
          nullable: true
        member_count:
          type: integer
        students:
          type: array
          items:
            $ref: '#/components/schemas/StudentMini'
      required:
      - cohort_year
      - group_name
      - group_number
