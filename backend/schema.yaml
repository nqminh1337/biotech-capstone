  /certificates/v1/:
    get:
      operationId: certificates_v1_list
      description: |-
        Certificate Management with Role-Based Access Control:

        Mentors:
            - GET /certificates/v1/ -> list their own certificates
            - GET /certificates/v1/{id}/ -> retrieve their own certificate
            - POST /certificates/v1/ -> create their own certificate
            - PATCH /certificates/v1/{id}/ -> update their own certificate

        Admins:
            - Full CRUD access to all certificates
            - GET /certificates/v1/?expires_by=YYYY-MM-DD -> audit view with expiry filter
            - Can set 'verified' flag

        Supervisors:
            - GET /certificates/v1/ -> list certificates of mentors they oversee
            - GET /certificates/v1/{id}/ -> view specific certificates (read-only)

        Students:
            - No access
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      tags:
      - certificates
      security:
      - basicAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedMentorCertificateList'
          description: ''
    post:
      operationId: certificates_v1_create
      description: |-
        Certificate Management with Role-Based Access Control:

        Mentors:
            - GET /certificates/v1/ -> list their own certificates
            - GET /certificates/v1/{id}/ -> retrieve their own certificate
            - POST /certificates/v1/ -> create their own certificate
            - PATCH /certificates/v1/{id}/ -> update their own certificate

        Admins:
            - Full CRUD access to all certificates
            - GET /certificates/v1/?expires_by=YYYY-MM-DD -> audit view with expiry filter
            - Can set 'verified' flag

        Supervisors:
            - GET /certificates/v1/ -> list certificates of mentors they oversee
            - GET /certificates/v1/{id}/ -> view specific certificates (read-only)

        Students:
            - No access
      tags:
      - certificates
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MentorCertificateCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MentorCertificateCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MentorCertificateCreate'
        required: true
      security:
